name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1.12'
          - 'pre'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
  docs:
      name: Documentation
      runs-on: ubuntu-latest
      permissions:
        actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
        contents: write
        statuses: write
      steps:
        - uses: actions/checkout@v6
        - uses: julia-actions/setup-julia@v2
          with:
            version: '1'
        
        # 1. Install the official Makie graphics dependencies
        - name: Install binary dependencies
          run: sudo apt-get update && sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
        
        - uses: julia-actions/cache@v3
        
        # 2. Build package
        - uses: julia-actions/julia-buildpkg@v1
        
        # 3. Run Doctests explicitly via xvfb-run
        - name: Run doctests
          run: |
            xvfb-run -s '-screen 0 1024x768x24' julia --project=docs --color=yes -e '
              using Documenter: DocMeta, doctest
              using AeroPanels
              DocMeta.setdocmeta!(AeroPanels, :DocTestSetup, :(using AeroPanels); recursive=true)
              doctest(AeroPanels)'

        # 4. Build and Deploy directly via xvfb-run (replacing julia-docdeploy)
        - name: Build and deploy docs
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          run: xvfb-run -s '-screen 0 1024x768x24' julia --project=docs --color=yes docs/make.jl